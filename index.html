<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fix-It Felix Emulator - Tema iOS Kaca</title>
    <style>
        /* Tema Dasar & Background */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            background-size: cover;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
            overflow: hidden;
        }

        /* Latar Belakang Geometris agar efek kaca lebih terlihat */
        .bg-shapes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
        }
        .shape1 { width: 300px; height: 300px; background: #ff0844; top: -100px; left: -100px; }
        .shape2 { width: 400px; height: 400px; background: #f5576c; bottom: -150px; right: -100px; }
        .shape3 { width: 250px; height: 250px; background: #9b23ea; top: 30%; left: 40%; }

        /* Efek Glassmorphism (Kaca ala iOS) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
        }

        /* Container Game */
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            position: relative;
        }

        /* Tempat EmulatorJS dimuat */
        #game-container {
            width: 100%;
            height: 75vh; /* Menggunakan sebagian besar layar */
            min-height: 300px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background: #000;
        }

    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <div id="game-wrapper">
        <!-- Area Emulator -->
        <div id="game-container">
            <div id="game"></div>
        </div>
    </div>

    <script>
        // Konfigurasi EmulatorJS
        window.EJS_player = '#game';
        window.EJS_core = 'segaMD'; // Core Sega Genesis / Mega Drive
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        window.EJS_color = '#4facfe'; // Warna tema emulator
        window.EJS_startOnLoaded = true; // Langsung jalan saat selesai loading
        
        // --- MEMUAT ROM DARI FOLDER YANG SAMA ---
        // Karena file fixitfelix.md ada di folder yang sama dengan index.html,
        // kita cukup menuliskan nama filenya saja.
        window.EJS_gameUrl = 'fixitfelix.md';

        // Memuat skrip inti EmulatorJS
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
